<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подсветка нецензурных слов</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        h1 {
            font-size: 16px;
            margin: 0 0 10px 0;
            color: #000;
        }
        .version {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }
        .description {
            margin-bottom: 15px;
        }
        .features {
            background: #fff9c4;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        .features h3 {
            margin: 0 0 5px 0;
            font-size: 13px;
        }
        .features ul {
            margin: 0;
            padding-left: 20px;
        }
        .features li {
            margin: 3px 0;
        }
        .github-link {
            display: block;
            text-align: center;
            padding: 10px;
            background: #24292e;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .github-link:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <h1>🇷🇺 Подсветка нецензурных слов</h1>
    <div class="version">Версия: 1.5.5</div>
    
    <div class="description">
        Расширение выделяет матерные слова без цензуры жёлтым маркером.
    </div>
    
    <div class="features">
        <h3>✨ Особенности:</h3>
        <ul>
            <li>Работает на всех сайтах</li>
            <li>Распознаёт замены: 3=з, 6=б, @=а</li>
            <li>Не скрывает текст, только выделяет</li>
            <li>Поддерживает динамический контент</li>
        </ul>
    </div>
    
    <a href="https://github.com/Vova-iz-Tambova/rus-uncensored-words-highlight" 
       class="github-link" 
       target="_blank">
        📦 GitHub Репозиторий
    </a>
</body>
</html>
