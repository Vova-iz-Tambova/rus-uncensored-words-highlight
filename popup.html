<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подсветка нецензурных слов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            height: 460px;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            color: #222;
            background: #fff;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 {
            flex: 1;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }
        .header-info-btn, .back-btn, .edit-name-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1.5px solid #aaa;
            background: none;
            color: #aaa;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .15s, color .15s, background .15s, transform .1s;
            line-height: 1;
        }
        .header-info-btn:hover, .back-btn:hover, .edit-name-btn:hover {
            border-color: #555;
            color: #555;
            background: #f5f5f5;
        }
        .header-info-btn:active, .back-btn:active, .edit-name-btn:active { transform: scale(0.86); }
        .header-info-btn {
            font-size: 13px;
            font-weight: 600;
            font-family: 'Times New Roman', serif;
            font-style: italic;
        }
        .back-btn { font-size: 17px; }

        .add-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: #43a047;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
            flex-shrink: 0;
            transition: background .15s, transform .1s;
        }
        .add-btn:hover { background: #388e3c; }
        .add-btn:active { transform: scale(0.86); }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .list-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            transition: opacity .15s;
            animation: cardSlide .2s ease;
        }
        .list-card.disabled { opacity: .45; }
        .list-card:last-child { border-bottom: none; }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .color-text {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            font-size: 13px;
            font-weight: 700;
            line-height: 14px;
            text-align: center;
        }

        .list-name { flex: 1; font-weight: 500; font-size: 13px; cursor: pointer; }

        .switch-sm {
            position: relative;
            display: inline-block;
            width: 28px;
            height: 16px;
            flex-shrink: 0;
        }
        .switch-sm input { opacity: 0; width: 0; height: 0; }
        .switch-sm .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 16px;
            transition: .2s;
        }
        .switch-sm .slider:before {
            content: "";
            position: absolute;
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background: #fff;
            border-radius: 50%;
            transition: .2s;
        }
        .switch-sm input:checked + .slider { background: #43a047; }
        .switch-sm input:checked + .slider:before { transform: translateX(12px); }

        .editor-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .list-textarea {
            width: 100%;
            flex: 1;
            min-height: 0;
            padding: 5px 6px;
            font-size: 12px;
            font-family: inherit;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
            outline: none;
            transition: border-color .15s;
        }
        .list-textarea:focus { border-color: #43a047; }
        .list-textarea::placeholder { color: #bbb; }

        .word-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }
        .word-row {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
            padding: 0;
        }
        .word-row input[type=checkbox] {
            margin: 0 0 0 4px;
            flex-shrink: 0;
        }
        .word-text {
            flex: 1;
            font-size: 12px;
            color: #333;
            padding: 2px 0;
            outline: none;
            white-space: pre;
        }

        .filename-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            font-size: 12px;
            color: #666;
            flex-shrink: 0;
        }
        .filename-row code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        .delete-row {
            margin-top: 10px;
            flex-shrink: 0;
            position: relative;
            min-height: 26px;
        }
        .delete-btn {
            width: 100%;
            padding: 5px 0;
            border: 1px solid #e57373;
            border-radius: 4px;
            background: #fff;
            color: #c62828;
            cursor: pointer;
            font-size: 12px;
            transition: opacity .2s ease, transform .2s ease;
        }
        .delete-btn:hover { background: #ffebee; }
        .delete-btn:active { transform: scale(0.96); }
        .delete-btn.is-hidden {
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
        }
        .delete-confirm {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 8px;
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
        }
        .delete-confirm.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .delete-confirm button {
            flex: 1;
            padding: 5px 0;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: background .15s, transform .1s;
        }
        .delete-confirm button:active { transform: scale(0.96); }
        .delete-cancel { color: #666; }
        .delete-cancel:hover { background: #f5f5f5; }
        .delete-do {
            border-color: #e57373;
            color: #c62828;
        }
        .delete-do:hover { background: #ffebee; }

        #lists, #editor, #addView, #infoView {
            transition: opacity .12s ease;
        }
        #lists { flex: 1; overflow-y: auto; }
        #editor, #addView, #infoView {
            flex: 1; display: flex; flex-direction: column;
            min-height: 0;
            animation: fadeIn .15s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .editor-upload-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: #1976d2;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, transform .1s;
        }
        .editor-upload-btn:hover { background: #1565c0; }
        .editor-upload-btn:active { transform: scale(0.86); }


        /* Finder-like palette */
        .palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 14px;
            padding: 12px 0 8px;
        }
        .palette-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            width: 72px;
        }
        .palette-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: transform .15s, box-shadow .15s;
            flex-shrink: 0;
        }
        .palette-swatch:hover { transform: scale(1.12); }
        .palette-swatch.selected {
            box-shadow: 0 0 0 2.5px #555;
            transform: scale(1.12);
        }
        .palette-label {
            font-size: 10px;
            color: #555;
            text-align: center;
            white-space: nowrap;
        }

        /* Type toggle */
        .type-row {
            display: flex;
            margin: 6px 0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #ccc;
        }
        .type-btn {
            flex: 1;
            padding: 5px 16px;
            border: none;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            color: #555;
            text-align: center;
            transition: background .15s, color .15s, transform .1s;
        }
        .type-btn:hover { background: #f0f0f0; }
        .type-btn:active { transform: scale(0.94); }
        .type-btn.active {
            background: #007aff;
            color: #fff;
        }
        .type-btn:first-child { border-right: 1px solid #ccc; }

        /* Add view status text */
        /* Preview area */
        .add-preview {
            text-align: center;
            padding: 8px 0;
            font-size: 13px;
            color: #333;
        }

        .builtin-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            margin: 4px 0;
        }
        .builtin-row span { font-size: 12px; color: #555; }

        /* Confirm button */
        .confirm-btn {
            display: block;
            width: 100%;
            padding: 8px 0;
            border: none;
            border-radius: 6px;
            background: #007aff;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s, opacity .15s, transform .1s;
            margin-top: 4px;
        }
        .confirm-btn:hover:not(:disabled) { background: #0062cc; }
        .confirm-btn:active:not(:disabled) { transform: scale(0.96); }
        .confirm-btn:disabled { opacity: .4; cursor: default; }

        /* Info view */
        .info-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .info-content {
            flex: 1;
            font-size: 12px;
            line-height: 1.5;
            color: #444;
        }
        .info-row {
            display: flex;
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-label { color: #888; width: 100px; flex-shrink: 0; }
        .info-value { color: #222; }
    </style>
</head>
<body>
    <div class="header" id="mainHeader">
        <button class="header-info-btn" id="infoBtn" title="О расширении">i</button>
        <h1>Подсветка слов</h1>
        <button class="add-btn" id="addBtn" title="Добавить список">+</button>
    </div>

    <div id="lists"></div>
    <div id="editor" style="display:none"></div>
    <div id="addView" style="display:none"></div>
    <div id="infoView" style="display:none"></div>

    <script src="popup.js"></script>
</body>
</html>
